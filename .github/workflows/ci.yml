name: CI Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psl_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psl-one/api exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psl_test
          JWT_SECRET: ci-local-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Validate Prisma schema
        run: pnpm --filter @psl-one/api exec prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psl_test
          JWT_SECRET: ci-local-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Apply all Prisma migrations
        run: pnpm --filter @psl-one/api db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psl_test
          JWT_SECRET: ci-local-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Seed reference data
        run: pnpm --filter @psl-one/api db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psl_test
          JWT_SECRET: ci-local-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Verify seed idempotency
        run: pnpm --filter @psl-one/api db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psl_test
          JWT_SECRET: ci-local-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: API typecheck
        run: pnpm --filter @psl-one/api typecheck
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psl_test
          JWT_SECRET: ci-local-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Web typecheck
        run: pnpm --filter @psl-one/web typecheck

      - name: API tests
        run: pnpm --filter @psl-one/api test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psl_test
          JWT_SECRET: ci-local-secret-at-least-32-characters-long
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379

      - name: Web tests
        run: pnpm --filter @psl-one/web test

      - name: API build
        run: pnpm --filter @psl-one/api build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psl_test
          JWT_SECRET: ci-local-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Web build
        run: pnpm --filter @psl-one/web build

      - name: Validate Codex project rules
        run: pnpm codex:validate

      - name: Validate documentation
        run: pnpm docs:validate

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  event-schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate event schemas
        # passWithNoTests: schema package has no test files yet; exit 0 until tests are added
        run: pnpm --filter @psl-one/event-schemas exec vitest run --passWithNoTests

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        # exit-code: 0 — advisory mode; known undici HIGH CVEs tracked in security triage story
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
