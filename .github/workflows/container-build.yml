name: Container Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            target: runner
            image: psl-one-api
          - name: api-migrator
            dockerfile: apps/api/Dockerfile
            target: migrator
            image: psl-one-api-migrator
          - name: web
            dockerfile: apps/web/Dockerfile
            target: runner
            image: psl-one-web

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: ${{ matrix.image }}:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.staging.pslone.example
            NEXT_PUBLIC_ENVIRONMENT_LABEL=container-build
            NEXT_PUBLIC_GIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_BUILD_TIMESTAMP=${{ github.run_id }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Scan image
        # exit-code: 0 — advisory mode; known undici HIGH CVEs tracked in security triage story
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
